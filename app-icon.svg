<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">De Burgemeester Spel</title>
  <desc id="desc">Een witte B met hoge hoed op een donkere achtergrond met gouden rand.</desc>
  <defs>
    <radialGradient id="bg" cx="72%" cy="20%" r="90%">
      <stop offset="0" stop-color="#824329"/>
      <stop offset=".48" stop-color="#38271f"/>
      <stop offset="1" stop-color="#17120e"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f0d29b"/>
      <stop offset=".5" stop-color="#b98545"/>
      <stop offset="1" stop-color="#e5bc7e"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity=".55"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="88" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <g filter="url(#shadow)" fill="#fffaf2">
    <text x="256" y="382" text-anchor="middle" font-family="Georgia,serif" font-size="294" font-weight="700">B</text>
    <g transform="translate(252 82) rotate(10)">
      <path d="M-67 0h112l-14 103H-51z"/>
      <path d="M-92 104c36 24 105 28 151 3 8-5 16 8 8 15-46 40-132 32-171-3-8-7 3-21 12-15z"/>
      <path d="M-53 78h87l-3 24c-28 11-57 8-87-4z" fill="#d6aa6b"/>
    </g>
  </g>
  <text x="256" y="450" text-anchor="middle" fill="#e6c18a" font-family="Arial,sans-serif" font-size="25" font-weight="700" letter-spacing="5">KROEGSPEL</text>
</svg>
